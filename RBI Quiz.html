* {

body {

  align-items: center;
  height: 100vh;
}

/* Container */
.app {
  width: 95%;
  max-width: 500px;
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* Header */
header {
  display: flex;
  justify-content: space-between;

}

.timer {

  padding: 5px 10px;
  border-radius: 5px;
}

/* Question */
.question {
  font-size: 20px;
  margin-bottom: 15px;
}

/* Options */
.option {
  background: #eee;
  padding: 10px;
  margin: 8px 0;
  border-radius: 5px;
  cursor: pointer;
  transition: 0.3s;
}

.option:hover {
  background: #ddd;
}

.correct {
  background: #4CAF50 !important;
  color: white;
}

.wrong {
  background: #f44336 !important;
  color: white;
}

/* Button */
button {
  margin-top: 15px;
  padding: 10px;
  width: 100%;
  border: none;
 background:linear-gradient(135deg,#0a2dbcf3,#779af583);
  color: white;
  font-size: 16px;
  cursor: pointer;
  border-radius: 5px;
}

/* Hidden */
.hide {
  display: none;
}

/* Result */
.result {
  text-align: center;
}

/* Responsive */
@media (max-width: 600px) {
  .question {
    font-size: 18px;
  }
}
</style>

let index = 0;
let score = 0;
let timer;
let timeLeft = 10;

function startQuiz() {
  document.getElementById("startScreen").classList.add("hide");
  document.getElementById("quizScreen").classList.remove("hide");
  loadQuestion();
}

function loadQuestion() {
  resetTimer();
  let q = quizData[index];
  document.getElementById("question").innerText = q.question;
  document.getElementById("qNo").innerText = index + 1;

  let optionsHTML = "";
  q.options.forEach((opt, i) => {
    optionsHTML += `<div class="option" onclick="selectOption(${i})">${opt}</div>`;
  });

  document.getElementById("options").innerHTML = optionsHTML;
}

function selectOption(selected) {
  let correct = quizData[index].answer;
  let options = document.querySelectorAll(".option");

  options.forEach((opt, i) => {
    if (i === correct) opt.classList.add("correct");
    else if (i === selected) opt.classList.add("wrong");

    opt.style.pointerEvents = "none";
  });

  if (selected === correct) score++;
}

function nextQuestion() {
  index++;
  if (index < quizData.length) {
    loadQuestion();
  } else {
    showResult();
  }
}

  function showResult() {
  document.getElementById("quizScreen").classList.add("hide");
  document.getElementById("resultScreen").classList.remove("hide");
  document.getElementById("score").innerText = score + " / " + quizData.length;
}

function resetTimer() {
  clearInterval(timer);
  timeLeft = 10;
  document.getElementById("timer").innerText = timeLeft;

  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;

    if (timeLeft === 0) {
      nextQuestion();
    }
  }, 1000);
}
