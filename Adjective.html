let index = 0;
let score = 0;
let timer;
let timeLeft = 10;

function startQuiz() {
  document.getElementById("startScreen").classList.add("hide");
  document.getElementById("quizScreen").classList.remove("hide");
  loadQuestion();
}

function loadQuestion() {
  resetTimer();
  let q = quizData[index];
  document.getElementById("question").innerText = q.question;
  document.getElementById("qNo").innerText = index + 1;

  let optionsHTML = "";
  q.options.forEach((opt, i) => {
    optionsHTML += `<div class="option" onclick="selectOption(${i})">${opt}</div>`;
  });

  document.getElementById("options").innerHTML = optionsHTML;
}

function selectOption(selected) {
  let correct = quizData[index].answer;
  let options = document.querySelectorAll(".option");

  options.forEach((opt, i) => {
    if (i === correct) opt.classList.add("correct");
    else if (i === selected) opt.classList.add("wrong");

    opt.style.pointerEvents = "none";
  });

  if (selected === correct) score++;
}

function nextQuestion() {
  index++;
  if (index < quizData.length) {
    loadQuestion();
  } else {
    showResult();
  }
}

  function showResult() {
  document.getElementById("quizScreen").classList.add("hide");
  document.getElementById("resultScreen").classList.remove("hide");
  document.getElementById("score").innerText = score + " / " + quizData.length;
}

function resetTimer() {
  clearInterval(timer);
  timeLeft = 10;
  document.getElementById("timer").innerText = timeLeft;

  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;

    if (timeLeft === 0) {
      nextQuestion();
    }
  }, 1000);
}
